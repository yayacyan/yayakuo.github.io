<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>きくよう みんなの応援券 | 対象店検索</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <h1>きくよう みんなの応援券</h1>
        <p class="header-sub">対象店舗検索（3月23日時点）</p>
      </div>
      <button class="toggle-search-btn" id="toggleSearchBtn" aria-expanded="true" aria-controls="searchPanel">
        検索条件を隠す
      </button>
    </div>
  </header>

  <!-- 検索パネル（内縮可能） -->
  <div class="search-panel" id="searchPanel">
    <div class="search-panel-inner">

      <!-- キーワード検索 -->
      <div class="search-row">
        <label for="keywordInput" class="search-label">キーワード</label>
        <div class="search-input-wrap">
          <input
            type="text"
            id="keywordInput"
            class="search-input"
            placeholder="店名・住所・サービス内容などで検索"
            autocomplete="off"
          />
          <button class="clear-btn" id="clearKeyword" title="クリア" aria-label="キーワードをクリア">×</button>
        </div>
      </div>

      <!-- 分類・エリア -->
      <div class="search-row search-row-filters">
        <div class="filter-group">
          <label for="categorySelect" class="search-label">分類</label>
          <select id="categorySelect" class="search-select">
            <!-- JSで動的に生成 -->
          </select>
        </div>
        <div class="filter-group">
          <label for="areaSelect" class="search-label">地区</label>
          <select id="areaSelect" class="search-select">
            <!-- JSで動的に生成 -->
          </select>
        </div>
        <button class="reset-btn" id="resetBtn">条件をリセット</button>
      </div>

      <!-- 分類クイックボタン -->
      <div class="quick-pills" id="categoryPills">
        <!-- JSで動的に生成 -->
      </div>

      <!-- エリアクイックボタン -->
      <div class="quick-pills area-pills" id="areaPills">
        <!-- JSで動的に生成 -->
      </div>

    </div>
  </div>

  <!-- 結果ヘッダー -->
  <div class="result-header" id="resultHeader">
    <span class="result-count" id="resultCount">---</span>
    <div class="sort-wrap">
      <label for="sortSelect" class="sort-label">並び順：</label>
      <select id="sortSelect" class="sort-select">
        <option value="default">登録番号順</option>
        <option value="name">店名（五十音）</option>
        <option value="area">地区別</option>
        <option value="category">分類別</option>
      </select>
    </div>
  </div>

  <!-- 店舗カードリスト -->
  <main class="main-content">
    <div class="card-grid" id="cardGrid">
      <!-- JSで動的に生成 -->
    </div>
    <div class="no-result hidden" id="noResult">
      <p>該当する店舗が見つかりませんでした。</p>
      <p>キーワードや条件を変更してお試しください。</p>
    </div>
  </main>

  <!-- ページネーション -->
  <div class="pagination" id="pagination">
    <!-- JSで動的に生成 -->
  </div>

  <!-- フッター -->
  <footer class="site-footer">
    <p>出典：菊陽町「きくよう みんなの応援券」対象店一覧表（3月23日時点）</p>
  </footer>

  <!-- 先頭に戻るボタン -->
  <button class="back-to-top" id="backToTop" title="先頭に戻る" aria-label="先頭に戻る">▲</button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
